<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Panel administrativo Fortress Educa{% endblock %}">
    <title>{% block titulo %}Fortress Educa - Panel Administrativo{% endblock %}</title>

    <!-- Icono de la Pestaña -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='image/shield_gear.png') }}" type="image/x-icon">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Custom Especific CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>

<body>
    <div class="dashboard-container">
        {% include 'components/admin_sidebar.html' %}

        <div class="dashboard-content">
            <!-- Bloque header -->
            {% include 'components/admin_header.html' %}

            <!-- Bloque de contenido -->
            {% block Contenido_Pagina %}

            {% endblock %}

            <!-- Bloque logout modal -->
            {% include 'components/modal_global.html' %}
        </div>
    </div>
    
    <!-- Modal flash para errores -->
    {% include 'components/flash_modal.html' %}
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Dashboard Logic -->
    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
