{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
    <div class="modal fade" id="loginErrorModal" tabindex="-1" aria-labelledby="loginErrorModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-primary">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="loginErrorModalLabel"><i class="fas fa-info-circle"></i> Fortress Educa</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'danger' else category }} mb-2">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var modal = new bootstrap.Modal(document.getElementById('loginErrorModal'));
            modal.show();
        });
    </script>
{% endif %}
{% endwith %}
