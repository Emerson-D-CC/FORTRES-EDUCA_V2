<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Panel de usuario Fortress Educa{% endblock %}">
    <title>{% block titulo %}Fortress Educa - Panel de Usuario{% endblock %}</title>

    <link rel="shortcut icon" href="{{ url_for('static', filename='image/shield.png') }}" type="image/x-icon">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Custom Especific CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard_users.css') }}">
</head>

<body>
    <div class="dashboard-container">
        {% include 'components/user_sidebar.html' %}

        <div class="dashboard-content">
            <!-- Bloque header -->
            {% include 'components/user_header.html' %}
            
            <!-- Bloque de contenido -->
            {% block Contenido_Pagina %}

            {% endblock %}

            <!-- Bloque logout modal -->
            {% include 'components/logout_modal.html' %}
        </div>
    </div>

    <!-- Modal flash para errores -->
    {% include 'components/modal_global.html' %}
    <!-- Modal global reutilizable -->
    {% block modal_global %}{% endblock %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Dashboard Logic -->
    <script src="{{ url_for('static', filename='js/dashboard_users.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
